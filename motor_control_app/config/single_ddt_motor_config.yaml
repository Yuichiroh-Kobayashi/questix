# Single DDT Motor Component Configuration
# 全パラメータは ROS2 標準形式 (<node_name>: ros__parameters: ...) で記述する。
# このファイルが Single Source of Truth。launch 側ではインライン上書きしないこと。
single_ddt_motor_node:
  ros__parameters:
    # シリアル通信設定
    serial_port: "/dev/ttyACM0"
    baud_rate: 57600

    # モータ設定
    motor_id: 4
    max_motor_rpm: 100
    wheel_radius: 0.1  # meters

    # 制御パラメータ
    # RPM = linear_x * velocity_scale_factor
    velocity_scale_factor: 60.0

    # 安全設定
    watchdog_timeout: 1.0  # seconds - この時間 Twist が来ないとモータ停止

    # ステータス公開設定
    status_publish_rate: 5.0  # Hz
