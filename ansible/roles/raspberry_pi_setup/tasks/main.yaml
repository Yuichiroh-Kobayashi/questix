---
# Raspberry Pi Setup Tasks

- name: Install Raspberry Pi specific utilities
  ansible.builtin.apt:
    name:
      - git
      - wget
      - curl
      - vim
      - nano
      - htop
      - tree
      - build-essential
      - cmake
      - gdb
      - i2c-tools
      - python3-pip
      - python3-dev
      - python3-setuptools
      - python3-wheel
      - python3-rpi.gpio
      - python3-gpiozero
      - libraspberrypi-bin
      - libserial-dev
      - libgpiod-dev
    state: present
    update_cache: true

- name: Create gpio group
  ansible.builtin.group:
    name: gpio
    state: present

- name: Add user to gpio and related groups
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups: gpio,input,dialout
    append: true
