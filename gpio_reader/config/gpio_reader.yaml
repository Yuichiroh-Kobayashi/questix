gpio_reader_node:
  ros__parameters:
    # Use simulation time
    use_sim_time: false

    # GPIO chip device path (for Raspberry Pi 5, use /dev/gpiochip4)
    chip_name: "/dev/gpiochip4"

    # GPIO pins to monitor (BCM numbering)
    gpio_pins: [27]

    # Publishing rate in Hz
    publish_rate: 20.0
