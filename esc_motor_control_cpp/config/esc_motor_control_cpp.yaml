esc_motor_control:
  ros__parameters:
    # Use simulation time
    use_sim_time: false

    # Joy input topic
    joy_topic: "/joy"

    # PWM settings
    pwm_pin: 13 # GPIO pin for PWM output

    # ESC pulse width settings (microseconds)
    # speed=0.0 maps to (min+max)/2. With 0/2000, speed=0 → 1000μs (stopped)
    min_pulse_width: 0 # Minimum pulse width (speed=-1.0)
    max_pulse_width: 2000 # Maximum pulse width (speed=1.0)
    neutral_pulse_width: 1000 # ESC arm/idle position (1.0ms = stopped)

    # Motor speed limits
    max_speed: 1.0 # Maximum forward speed (maps to max_pulse_width)
    min_speed: -1.0 # Maximum reverse speed (maps to min_pulse_width)

    # Roller spin button / ローラー回転ボタン
    # Switch2 native index: ZR button = 7
    full_speed_button: 7
    full_speed_value: 1.0 # Speed value when full speed button is pressed
    # ローラモータのコマンド状態出力先
    # ここには実測回転数ではなく、ESCへ送っている現在の指令値が出ます。
    status_topic: "/roller_motor_status"
    emergency_status_topic: "/roller_emergency_status"

    # Safety settings
    enable_safety_stop: true # Enable automatic safety stop
    safety_timeout: 1.0 # Seconds without command before safety stop

    # Test mode (disables actual GPIO – pure simulation)
    test_mode: false

    # PWM backend: "auto" (try pigpio→lgpio→sim), "pigpio", "lgpio", "simulation"
    pwm_backend: "auto"

    # GPIO chip number for lgpio backend (0 = Pi4, 4 = Pi5)
    gpio_chip_num: 4
