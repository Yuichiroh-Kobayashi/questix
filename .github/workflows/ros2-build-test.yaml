name: ROS2 Build and Test

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "**.md"
      - "ansible/**"
      - "docker/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "**.md"
      - "ansible/**"
      - "docker/**"
      - "scripts/**"
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.ros_distro }}, ${{ matrix.architecture }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ros_distro: jazzy
            architecture: amd64
            allow_failure: false
          - ros_distro: jazzy
            architecture: arm64
            allow_failure: true
      fail-fast: false
    continue-on-error: ${{ matrix.allow_failure }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        if: matrix.architecture == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Start ROS container
        run: |
          docker pull --platform linux/${{ matrix.architecture }} ros:${{ matrix.ros_distro }}-ros-base
          docker run -d --name ros_build \
            --platform linux/${{ matrix.architecture }} \
            --init \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            -w "$GITHUB_WORKSPACE" \
            -e DEBIAN_FRONTEND=noninteractive \
            ros:${{ matrix.ros_distro }}-ros-base \
            tail -f /dev/null
          docker exec ros_build git config --global --add safe.directory '*'

      - name: Install build dependencies
        run: |
          docker exec ros_build bash -c "apt-get update && apt-get install -y \
            python3-colcon-common-extensions \
            python3-serial \
            python3-vcstool \
            ccache \
            git \
            libgpiod-dev \
            wget \
            && rm -rf /var/lib/apt/lists/*"

      - name: Configure git
        run: |
          docker exec -i ros_build bash << 'EOF'
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --global init.defaultBranch main
          git config --global --add safe.directory $(pwd)
          EOF

      - name: Setup workspace and dependencies
        run: |
          if [ -f dependency.repos ]; then
            docker exec -i ros_build bash << 'EOF'
            git config --global url."https://github.com/".insteadOf "git@github.com:"
            git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
            vcs import . < dependency.repos
          EOF
          fi

      - name: Generate rosdep keys
        run: |
          docker exec -i ros_build bash << 'EOF'
          rosdep init || true
          rosdep update
          rosdep keys --from-paths . --rosdistro $ROS_DISTRO > rosdep_keys.txt || echo "No rosdep keys found"
          EOF

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            build
            install
          key: build-${{ matrix.ros_distro }}-${{ runner.os }}-${{ matrix.architecture }}-${{ hashFiles('*/CMakeLists.txt', '*/*.cmake', '*/package.xml') }}
          restore-keys: |
            build-${{ matrix.ros_distro }}-${{ runner.os }}-${{ matrix.architecture }}-

      - name: Install package dependencies
        run: |
          docker exec -i ros_build bash << 'EOF'
          apt-get -yqq update
          rosdep install -yqq --from-paths . --ignore-src --rosdistro $ROS_DISTRO || true
          EOF

      - name: Setup colcon mixin
        run: |
          docker exec -i ros_build bash << 'EOF'
          colcon mixin add default https://raw.githubusercontent.com/colcon/colcon-mixin-repository/master/index.yaml || true
          colcon mixin update default || true
          EOF

      - name: Build ROS2 packages
        run: |
          set +e
          docker exec -i ros_build bash << 'EOF'
          source /opt/ros/$ROS_DISTRO/setup.bash
          PARALLEL_WORKERS=$(nproc)
          echo "Using $PARALLEL_WORKERS parallel workers for build"
          colcon build \
            --event-handlers console_cohesion+ \
            --parallel-workers $PARALLEL_WORKERS \
            --cmake-args -DCMAKE_BUILD_TYPE=Release \
            --symlink-install
          EOF
          build_status=$?
          set -e
          if [[ "$build_status" -ne 0 ]]; then
            if [[ "${{ matrix.allow_failure }}" == "true" ]]; then
              echo "::warning title=Allowed ${{ matrix.architecture }} build failure::colcon build exited with $build_status"
            else
              exit "$build_status"
            fi
          fi

      - name: Run tests
        run: |
          if ! docker exec ros_build test -f install/setup.bash; then
            if [[ "${{ matrix.allow_failure }}" == "true" ]]; then
              echo "::warning title=Allowed ${{ matrix.architecture }} test skip::install/setup.bash was not generated"
              exit 0
            fi
            echo "install/setup.bash was not generated"
            exit 1
          fi
          set +e
          docker exec -i ros_build bash << 'EOF'
          source /opt/ros/$ROS_DISTRO/setup.bash
          source install/setup.bash
          colcon test \
            --event-handlers console_cohesion+ \
            --parallel-workers $(nproc) \
            --packages-skip ydlidar_ros2_driver ydlidar_sdk_vendor
          EOF
          test_status=$?
          set -e
          if [[ "$test_status" -ne 0 ]]; then
            if [[ "${{ matrix.allow_failure }}" == "true" ]]; then
              echo "::warning title=Allowed ${{ matrix.architecture }} test failure::colcon test exited with $test_status"
            else
              exit "$test_status"
            fi
          fi

      - name: Show test results
        if: always()
        run: |
          if ! docker exec ros_build test -f install/setup.bash 2>/dev/null; then
            echo "No install/setup.bash found; skipping test result summary"
            exit 0
          fi
          docker exec -i ros_build bash << 'EOF'
          source /opt/ros/$ROS_DISTRO/setup.bash
          source install/setup.bash
          colcon test-result --verbose || echo "No test results found"
          EOF

      - name: Stop container
        if: always()
        run: docker stop ros_build && docker rm ros_build || true

  static-analysis:
    runs-on: ubuntu-latest
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base
    env:
      DEBIAN_FRONTEND: noninteractive
    strategy:
      matrix:
        ros_distro: [jazzy]
    steps:
      - name: Suppress git warnings
        run: git config --global --add safe.directory '*'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install linting tools
        run: |
          apt-get update && apt-get install -y python3-flake8 pydocstyle && rm -rf /var/lib/apt/lists/*

      - name: Run flake8 (Python style check)
        run: |
          find . -name "*.py" -not -path "./__pycache__/*" -not -path "./build/*" -not -path "./install/*" -not -path "./log/*" -not -path "./scripts/*" -not -name "ddt_checker.py" -not -name "test_esc.py" | xargs -r python3 -m flake8 --select=F --max-line-length=100 --ignore=E501,W503

      - name: Run pydocstyle (Python docstring check)
        run: |
          find . -name "*.py" -not -path "./__pycache__/*" -not -path "./build/*" -not -path "./install/*" -not -path "./log/*" -not -path "./scripts/*" -not -name "ddt_checker.py" -not -name "test_esc.py" | xargs -r python3 -m pydocstyle --ignore=D100,D101,D102,D103,D104,D105,D107,D203,D213,D400,D415

  format-check:
    runs-on: ubuntu-latest
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base
    env:
      DEBIAN_FRONTEND: noninteractive
    strategy:
      matrix:
        ros_distro: [jazzy]
    if: github.event_name == 'pull_request'
    steps:
      - name: Suppress git warnings
        run: git config --global --add safe.directory '*'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ament_clang_format
        run: |
          apt-get update && apt-get install -y \
            ros-${{ matrix.ros_distro }}-ament-clang-format \
            ros-dev-tools \
            && rm -rf /var/lib/apt/lists/*

      - name: Check C++ formatting
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          git ls-files -z -- '*.cpp' '*.hpp' | xargs -0 -r ament_clang_format --config .clang-format

  build-summary:
    needs: [build-and-test, static-analysis, format-check]
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base
    env:
      DEBIAN_FRONTEND: noninteractive
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build-and-test.result }}" == "success" ]; then
            echo "✅ **Build and Test**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build and Test**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.static-analysis.result }}" == "success" ]; then
            echo "✅ **Static Analysis**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Static Analysis**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.format-check.result }}" == "success" ] || [ "${{ needs.format-check.result }}" == "skipped" ]; then
            echo "✅ **Format Check**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Format Check**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
