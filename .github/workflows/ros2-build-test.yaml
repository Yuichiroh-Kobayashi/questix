name: ROS2 Build and Test

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "**.md"
      - "ansible/**"
      - "docker/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "**.md"
      - "ansible/**"
      - "docker/**"
      - "scripts/**"

defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base
      options: --platform linux/${{ matrix.architecture }}
    env:
      DEBIAN_FRONTEND: noninteractive
    strategy:
      matrix:
        include:
          - ros_distro: jazzy
            architecture: amd64
            allow_failure: false
          - ros_distro: jazzy
            architecture: arm64
            allow_failure: true
      fail-fast: false
    continue-on-error: ${{ matrix.allow_failure }}

    steps:
      - name: Suppress git warnings
        run: |
          git config --global --add safe.directory '*'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build dependencies
        run: |
          apt-get update && apt-get install -y \
            python3-colcon-common-extensions \
            python3-serial \
            python3-vcstool \
            ccache \
            git \
            libgpiod-dev \
            wget \
            && rm -rf /var/lib/apt/lists/*

      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git config --global init.defaultBranch main
          git config --global --add safe.directory $(pwd)

      - name: Setup workspace and dependencies
        run: |
          # Import additional repositories if dependency.repos exists
          if [ -f dependency.repos ]; then
            # Configure git to use HTTPS instead of SSH for GitHub
            git config --global url."https://github.com/".insteadOf "git@github.com:"
            git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
            # This repository root is the colcon workspace; dependency.repos entries must not
            # collide with existing package directories.
            vcs import . < dependency.repos
          fi

      - name: Generate rosdep keys
        run: |
          rosdep init || true
          rosdep update
          # CI starts from a clean checkout, so the repository root safely covers all packages.
          rosdep keys --from-paths . --rosdistro ${{ matrix.ros_distro }} > rosdep_keys.txt || echo "No rosdep keys found"

      - name: Cache rosdep
        id: cache-rosdep
        uses: actions/cache@v4
        with:
          path: |
            /var/lib/apt/lists
            /root/.ros/rosdep
          key: rosdep-${{ matrix.ros_distro }}-${{ runner.os }}-${{ hashFiles('rosdep_keys.txt') }}
          restore-keys: |
            rosdep-${{ matrix.ros_distro }}-${{ runner.os }}-

      - name: Install package dependencies
        run: |
          if [[ "${{ steps.cache-rosdep.outputs.cache-hit }}" == "true" ]]; then
            echo "Rosdep cache hit. Skipping rosdep install."
          else
            echo "Rosdep cache miss. Running rosdep install."
            apt-get -yqq update
            rosdep install -yqq --from-paths . --ignore-src --rosdistro ${{ matrix.ros_distro }} || true
          fi

      - name: Setup colcon mixin
        run: |
          colcon mixin add default https://raw.githubusercontent.com/colcon/colcon-mixin-repository/master/index.yaml || true
          colcon mixin update default || true

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            build
            install
          key: build-${{ matrix.ros_distro }}-${{ runner.os }}-${{ matrix.architecture }}-${{ hashFiles('*/CMakeLists.txt', '*/*.cmake', '*/package.xml') }}
          restore-keys: |
            build-${{ matrix.ros_distro }}-${{ runner.os }}-${{ matrix.architecture }}-

      - name: Build ROS2 packages
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash

          # Use optimized parallel workers for GitHub Actions
          PARALLEL_WORKERS=$(nproc)
          echo "Using $PARALLEL_WORKERS parallel workers for build"

          # Build with optimizations
          colcon build \
            --event-handlers console_cohesion+ \
            --parallel-workers $PARALLEL_WORKERS \
            --cmake-args -DCMAKE_BUILD_TYPE=Release \
            --symlink-install

      - name: Run tests
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          colcon test \
            --event-handlers console_cohesion+ \
            --parallel-workers $(nproc)

      - name: Show test results
        if: always()
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          colcon test-result --verbose || echo "No test results found"

  static-analysis:
    runs-on: ubuntu-latest
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base
    env:
      DEBIAN_FRONTEND: noninteractive
    strategy:
      matrix:
        ros_distro: [jazzy]
    steps:
      - name: Suppress git warnings
        run: git config --global --add safe.directory '*'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install linting tools
        run: |
          apt-get update && apt-get install -y python3-flake8 pydocstyle && rm -rf /var/lib/apt/lists/*

      - name: Run flake8 (Python style check)
        run: |
          find . -name "*.py" -not -path "./__pycache__/*" -not -path "./build/*" -not -path "./install/*" -not -path "./log/*" -not -path "./scripts/*" -not -name "ddt_checker.py" -not -name "test_esc.py" | xargs -r python3 -m flake8 --select=F --max-line-length=100 --ignore=E501,W503

      - name: Run pydocstyle (Python docstring check)
        run: |
          find . -name "*.py" -not -path "./__pycache__/*" -not -path "./build/*" -not -path "./install/*" -not -path "./log/*" -not -path "./scripts/*" -not -name "ddt_checker.py" -not -name "test_esc.py" | xargs -r python3 -m pydocstyle --ignore=D100,D101,D102,D103,D104,D105,D107,D203,D213,D400,D415

  format-check:
    runs-on: ubuntu-latest
    container:
      image: ros:${{ matrix.ros_distro }}-ros-base
    env:
      DEBIAN_FRONTEND: noninteractive
    strategy:
      matrix:
        ros_distro: [jazzy]
    if: github.event_name == 'pull_request'
    steps:
      - name: Suppress git warnings
        run: git config --global --add safe.directory '*'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ament_clang_format
        run: |
          apt-get update && apt-get install -y \
            ros-${{ matrix.ros_distro }}-ament-clang-format \
            ros-dev-tools \
            && rm -rf /var/lib/apt/lists/*

      - name: Check C++ formatting
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          git ls-files -z -- '*.cpp' '*.hpp' | xargs -0 -r ament_clang_format --config .clang-format

  build-summary:
    needs: [build-and-test, static-analysis, format-check]
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy-ros-base
    env:
      DEBIAN_FRONTEND: noninteractive
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build-and-test.result }}" == "success" ]; then
            echo "✅ **Build and Test**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build and Test**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.static-analysis.result }}" == "success" ]; then
            echo "✅ **Static Analysis**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Static Analysis**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.format-check.result }}" == "success" ] || [ "${{ needs.format-check.result }}" == "skipped" ]; then
            echo "✅ **Format Check**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Format Check**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
